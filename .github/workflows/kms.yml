name: KMS
# Build, test, and lint the cometkms nested module (kms/).
# Runs on every pull request and push to main. Each job is gated by a paths
# filter so it is skipped when no Go/Makefile/config files have changed. The
# filter includes all *.go files (not just kms/) because the kms module depends
# on the parent cometbft module via `replace => ../`, so parent changes can
# affect the kms build.

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            code:
              - '**/*.go'
              - 'Makefile'
              - 'go.*'
              - 'kms/go.*'
              - '.github/workflows/kms.yml'

      - run: echo "GO_VERSION=$(cat .github/workflows/go-version.env | grep GO_VERSION | cut -d '=' -f2)" >> $GITHUB_ENV
        if: steps.filter.outputs.code == 'true'

      - uses: actions/setup-go@v6
        if: steps.filter.outputs.code == 'true'
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build cometkms
        if: steps.filter.outputs.code == 'true'
        run: make kms-build

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            code:
              - '**/*.go'
              - 'Makefile'
              - 'go.*'
              - 'kms/go.*'
              - '.github/workflows/kms.yml'

      - run: echo "GO_VERSION=$(cat .github/workflows/go-version.env | grep GO_VERSION | cut -d '=' -f2)" >> $GITHUB_ENV
        if: steps.filter.outputs.code == 'true'

      - uses: actions/setup-go@v6
        if: steps.filter.outputs.code == 'true'
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Test cometkms (race detector)
        if: steps.filter.outputs.code == 'true'
        run: make kms-test-race

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            code:
              - '**/*.go'
              - 'Makefile'
              - 'go.*'
              - 'kms/go.*'
              - '.golangci.yml'
              - '.github/workflows/kms.yml'

      - run: echo "GO_VERSION=$(cat .github/workflows/go-version.env | grep GO_VERSION | cut -d '=' -f2)" >> $GITHUB_ENV
        if: steps.filter.outputs.code == 'true'

      - uses: actions/setup-go@v6
        if: steps.filter.outputs.code == 'true'
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Lint cometkms
        if: steps.filter.outputs.code == 'true'
        run: make kms-lint
