# CI testnet: lib-p2p + app mempool

[node.validator01]
use_libp2p = true
mempool_type = "app"
block_sync_adaptive_sync = true
snapshot_interval = 2
persistent_peers = ["validator02", "validator04", "validator05"]

[node.validator02]
use_libp2p = true
mempool_type = "app"
block_sync_adaptive_sync = true
perturb = ["kill"]

[node.validator03]
use_libp2p = true
mempool_type = "app"
block_sync_adaptive_sync = true

[node.validator04]
use_libp2p = true
mempool_type = "app"
block_sync_adaptive_sync = true
perturb = ["restart"]

[node.validator05]
use_libp2p = true
mempool_type = "app"
block_sync_adaptive_sync = true
perturb = ["disconnect", "pause"]

[node.validator06]
use_libp2p = true
mempool_type = "app"
block_sync_adaptive_sync = true
# sync from validator01
state_sync = true
start_at = 5
