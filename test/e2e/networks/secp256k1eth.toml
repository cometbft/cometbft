# This testnet pins all validators to the Ethereum-compatible secp256k1
# signature scheme (secp256k1eth). It exercises the consensus, gossip, and
# privval paths with the Ethereum-style 65-byte [R || S || V] signature format,
# making it a useful smoke test for the validator key type integration.
#
# To run end-to-end (requires docker):
#   cd test/e2e
#   make runner
#   ./build/runner -f networks/secp256k1eth.toml setup
#   ./build/runner -f networks/secp256k1eth.toml start
#   ./build/runner -f networks/secp256k1eth.toml test

key_type = "secp256k1eth"
abci_protocol = "builtin"
initial_height = 1
evidence = 0

[validators]
validator01 = 100
validator02 = 100
validator03 = 100
validator04 = 100

[node.validator01]
[node.validator02]
[node.validator03]
[node.validator04]
